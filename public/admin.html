<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大乐透AI预测系统 - 后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { color: #aaa; }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1em;
        }
        .login-box input::placeholder { color: #aaa; }
        
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .card h3 {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .status-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .status-item {
            background: rgba(0,0,0,0.3);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .status-dot.green { background: #4ade80; }
        .status-dot.yellow { background: #fbbf24; }
        .status-dot.red { background: #f87171; }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .data-table th { color: #aaa; font-weight: normal; }
        
        .mini-ball {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            text-align: center;
            border-radius: 50%;
            margin: 2px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .mini-ball.front { background: #ff6b6b; }
        .mini-ball.back { background: #4ecdc4; }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        .message.success { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; display: block; }
        .message.error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; display: block; }
        .message.info { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; display: block; }
        
        .kv-status {
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .kv-status.connected { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; }
        .kv-status.disconnected { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
        
        .recent-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .action-btn {
            padding: 5px 10px;
            font-size: 0.8em;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录界面 -->
        <div class="login-box" id="loginBox">
            <h2>🔐 后台管理登录</h2>
            <input type="password" id="passwordInput" placeholder="请输入管理密码" onkeypress="if(event.keyCode==13) login()">
            <button class="btn btn-primary" onclick="login()" style="width: 100%; margin-top: 15px;">登 录</button>
            <p id="loginError" style="color: #f87171; margin-top: 10px; display: none;">密码错误</p>
        </div>

        <!-- 管理面板 -->
        <div class="admin-panel" id="adminPanel">
            <div class="header">
                <h1>🎯 大乐透AI预测系统 - 后台管理</h1>
                <p>数据管理 | 系统监控 | Vercel KV 存储</p>
            </div>

            <!-- KV 状态 -->
            <div class="kv-status disconnected" id="kvStatus">
                <strong>📦 Vercel KV 状态：</strong> <span id="kvStatusText">检测中...</span>
            </div>

            <!-- 状态栏 -->
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" id="apiDot"></span>
                    <span>API状态: <span id="apiStatus">检测中</span></span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="dataDot"></span>
                    <span>数据源: <span id="dataSource">检测中</span></span>
                </div>
                <div class="status-item">
                    <span>最新期号: <span id="latestPeriod">--</span></span>
                </div>
                <div class="status-item">
                    <span>总期数: <span id="totalPeriods">--</span></span>
                </div>
            </div>

            <!-- 添加数据 -->
            <div class="card">
                <h3>➕ 添加开奖数据</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>期号</label>
                        <input type="text" id="periodInput" placeholder="如: 25142">
                    </div>
                    <div class="form-group">
                        <label>开奖日期</label>
                        <input type="date" id="dateInput">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>前区号码（5个，空格分隔）</label>
                        <input type="text" id="frontInput" placeholder="如: 04 09 24 28 29">
                    </div>
                    <div class="form-group">
                        <label>后区号码（2个，空格分隔）</label>
                        <input type="text" id="backInput" placeholder="如: 02 10">
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <button class="btn btn-primary" onclick="autoFillNextPeriod()">🔄 自动填充下期</button>
                    <button class="btn btn-success" onclick="addData()">✅ 添加数据</button>
                </div>
                <div class="message" id="addMessage"></div>
            </div>

            <!-- 当前数据 -->
            <div class="card">
                <h3>📊 当前数据</h3>
                <button class="btn btn-primary" onclick="loadCurrentData()">🔄 刷新数据</button>
                <button class="btn btn-warning" onclick="initKV()">🚀 初始化 KV 数据</button>
                <div id="currentDataContent" style="margin-top: 15px;">
                    <p style="color: #aaa;">点击"刷新数据"加载...</p>
                </div>
            </div>

            <!-- 最近开奖记录 -->
            <div class="card">
                <h3>📋 最近开奖记录</h3>
                <button class="btn btn-primary" onclick="loadRecentData()">🔄 加载记录</button>
                <div class="recent-list" id="recentDataContent" style="margin-top: 15px;">
                    <p style="color: #aaa;">点击"加载记录"查看...</p>
                </div>
            </div>

            <!-- 系统操作 -->
            <div class="card">
                <h3>🔧 系统操作</h3>
                <button class="btn btn-primary" onclick="checkHealth()">💓 系统健康检查</button>
                <button class="btn btn-warning" onclick="clearCache()">🧹 清除缓存</button>
                <button class="btn btn-danger" onclick="logout()">🚪 退出登录</button>
                <div class="message" id="systemMessage"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'lottery2025';
        let kvAvailable = false;

        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                checkSystemStatus();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('passwordInput').value = '';
        }

        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/latest-results');
                const data = await response.json();
                
                // API 状态
                document.getElementById('apiDot').className = 'status-dot green';
                document.getElementById('apiStatus').textContent = '正常';
                
                if (data.status === 'success') {
                    // 数据源
                    const source = data.data_source;
                    document.getElementById('dataDot').className = source === 'kv_storage' ? 'status-dot green' : 'status-dot yellow';
                    document.getElementById('dataSource').textContent = source === 'kv_storage' ? 'KV存储' : '默认备份';
                    
                    // KV 状态
                    kvAvailable = data.kv_available;
                    const kvStatusEl = document.getElementById('kvStatus');
                    const kvTextEl = document.getElementById('kvStatusText');
                    
                    if (source === 'kv_storage') {
                        kvStatusEl.className = 'kv-status connected';
                        kvTextEl.textContent = '✅ 已连接，数据持久化正常';
                    } else if (kvAvailable) {
                        kvStatusEl.className = 'kv-status connected';
                        kvTextEl.textContent = '⚠️ KV可用但无数据，请点击"初始化 KV 数据"';
                    } else {
                        kvStatusEl.className = 'kv-status disconnected';
                        kvTextEl.textContent = '❌ 未配置，请在 Vercel 中启用 KV Storage';
                    }
                    
                    // 期号信息
                    document.getElementById('latestPeriod').textContent = data.latest_result?.period || '--';
                    document.getElementById('totalPeriods').textContent = data.total_periods || '--';
                }
            } catch (error) {
                document.getElementById('apiDot').className = 'status-dot red';
                document.getElementById('apiStatus').textContent = '异常';
                document.getElementById('kvStatusText').textContent = '❌ API 连接失败';
            }
        }

        async function loadCurrentData() {
            const contentDiv = document.getElementById('currentDataContent');
            contentDiv.innerHTML = '<p style="color: #aaa;">加载中...</p>';
            
            try {
                const response = await fetch('/api/latest-results');
                const data = await response.json();
                
                if (data.status === 'success') {
                    const latest = data.latest_result;
                    const frontNumbers = latest.front_zone || [];
                    const backNumbers = latest.back_zone || [];
                    
                    contentDiv.innerHTML = `
                        <table class="data-table">
                            <tr><td>最新期号</td><td><strong>${latest.period}</strong></td></tr>
                            <tr><td>开奖日期</td><td>${latest.date || latest.draw_date}</td></tr>
                            <tr><td>开奖号码</td><td>
                                ${frontNumbers.map(n => `<span class="mini-ball front">${String(n).padStart(2, '0')}</span>`).join('')}
                                +
                                ${backNumbers.map(n => `<span class="mini-ball back">${String(n).padStart(2, '0')}</span>`).join('')}
                            </td></tr>
                            <tr><td>数据来源</td><td>${data.data_source === 'kv_storage' ? '🟢 Vercel KV' : '🟡 默认备份'}</td></tr>
                            <tr><td>数据范围</td><td>${data.data_range}</td></tr>
                            <tr><td>总期数</td><td>${data.total_periods} 期</td></tr>
                        </table>
                    `;
                    
                    // 更新状态
                    checkSystemStatus();
                } else {
                    contentDiv.innerHTML = `<p style="color: #f87171;">加载失败: ${data.message}</p>`;
                }
            } catch (error) {
                contentDiv.innerHTML = `<p style="color: #f87171;">请求失败: ${error.message}</p>`;
            }
        }

        async function loadRecentData() {
            const contentDiv = document.getElementById('recentDataContent');
            contentDiv.innerHTML = '<p style="color: #aaa;">加载中...</p>';
            
            try {
                const response = await fetch('/api/latest-results');
                const data = await response.json();
                
                if (data.status === 'success' && data.recent_results) {
                    let html = '<table class="data-table"><tr><th>期号</th><th>日期</th><th>开奖号码</th><th>操作</th></tr>';
                    
                    data.recent_results.forEach(item => {
                        const front = item.front_zone || [];
                        const back = item.back_zone || [];
                        html += `
                            <tr>
                                <td>${item.period}</td>
                                <td>${item.date}</td>
                                <td>
                                    ${front.map(n => `<span class="mini-ball front">${String(n).padStart(2, '0')}</span>`).join('')}
                                    +
                                    ${back.map(n => `<span class="mini-ball back">${String(n).padStart(2, '0')}</span>`).join('')}
                                </td>
                                <td>
                                    <button class="btn btn-danger action-btn" onclick="deleteData('${item.period}')">删除</button>
                                </td>
                            </tr>
                        `;
                    });
                    
                    html += '</table>';
                    contentDiv.innerHTML = html;
                } else {
                    contentDiv.innerHTML = '<p style="color: #f87171;">无数据</p>';
                }
            } catch (error) {
                contentDiv.innerHTML = `<p style="color: #f87171;">请求失败: ${error.message}</p>`;
            }
        }

        async function autoFillNextPeriod() {
            try {
                const response = await fetch('/api/latest-results');
                const data = await response.json();
                
                if (data.status === 'success' && data.latest_result) {
                    const currentPeriod = parseInt(data.latest_result.period);
                    const nextPeriod = currentPeriod + 1;
                    
                    document.getElementById('periodInput').value = nextPeriod;
                    
                    // 计算下一个开奖日
                    const today = new Date();
                    const dayOfWeek = today.getDay();
                    let daysToAdd = 0;
                    
                    if (dayOfWeek === 0) daysToAdd = 1;      // 周日 -> 周一
                    else if (dayOfWeek === 1) daysToAdd = 2; // 周一 -> 周三
                    else if (dayOfWeek === 2) daysToAdd = 1; // 周二 -> 周三
                    else if (dayOfWeek === 3) daysToAdd = 3; // 周三 -> 周六
                    else if (dayOfWeek === 4) daysToAdd = 2; // 周四 -> 周六
                    else if (dayOfWeek === 5) daysToAdd = 1; // 周五 -> 周六
                    else if (dayOfWeek === 6) daysToAdd = 2; // 周六 -> 周一
                    
                    const nextDate = new Date(today);
                    nextDate.setDate(today.getDate() + daysToAdd);
                    document.getElementById('dateInput').value = nextDate.toISOString().split('T')[0];
                    
                    alert(`已自动填充：第 ${nextPeriod} 期，日期 ${nextDate.toISOString().split('T')[0]}`);
                }
            } catch (error) {
                alert('获取数据失败: ' + error.message);
            }
        }

        async function addData() {
            const messageEl = document.getElementById('addMessage');
            
            const period = document.getElementById('periodInput').value.trim();
            const date = document.getElementById('dateInput').value;
            const frontStr = document.getElementById('frontInput').value.trim();
            const backStr = document.getElementById('backInput').value.trim();
            
            if (!period || !date || !frontStr || !backStr) {
                messageEl.className = 'message error';
                messageEl.textContent = '请填写所有字段';
                return;
            }
            
            const front = frontStr.split(/\s+/).map(n => parseInt(n)).filter(n => !isNaN(n));
            const back = backStr.split(/\s+/).map(n => parseInt(n)).filter(n => !isNaN(n));
            
            if (front.length !== 5) {
                messageEl.className = 'message error';
                messageEl.textContent = '前区必须是5个号码';
                return;
            }
            
            if (back.length !== 2) {
                messageEl.className = 'message error';
                messageEl.textContent = '后区必须是2个号码';
                return;
            }
            
            try {
                const response = await fetch('/api/latest-results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'add',
                        entry: { period, date, front, back }
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    messageEl.className = 'message success';
                    messageEl.textContent = `✅ ${data.message}`;
                    
                    // 清空表单
                    document.getElementById('periodInput').value = '';
                    document.getElementById('frontInput').value = '';
                    document.getElementById('backInput').value = '';
                    
                    // 刷新数据
                    loadCurrentData();
                    loadRecentData();
                    checkSystemStatus();
                } else {
                    messageEl.className = 'message error';
                    messageEl.textContent = `❌ ${data.message}`;
                }
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.textContent = `❌ 请求失败: ${error.message}`;
            }
        }

        async function deleteData(period) {
            if (!confirm(`确定要删除第 ${period} 期数据吗？`)) return;
            
            try {
                const response = await fetch('/api/latest-results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', period })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert(`✅ ${data.message}`);
                    loadRecentData();
                    loadCurrentData();
                    checkSystemStatus();
                } else {
                    alert(`❌ ${data.message}`);
                }
            } catch (error) {
                alert(`❌ 请求失败: ${error.message}`);
            }
        }

        async function initKV() {
            if (!confirm('确定要初始化 KV 数据吗？这将用默认数据覆盖现有 KV 数据。')) return;
            
            try {
                const response = await fetch('/api/latest-results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'init' })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert(`✅ ${data.message}`);
                    loadCurrentData();
                    loadRecentData();
                    checkSystemStatus();
                } else {
                    alert(`❌ ${data.message}`);
                }
            } catch (error) {
                alert(`❌ 请求失败: ${error.message}`);
            }
        }

        async function checkHealth() {
            const messageEl = document.getElementById('systemMessage');
            
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                if (data.status === 'healthy') {
                    messageEl.className = 'message success';
                    messageEl.textContent = `✅ 系统健康 | 版本: ${data.version} | 时间: ${data.timestamp}`;
                } else {
                    messageEl.className = 'message error';
                    messageEl.textContent = '❌ 系统异常';
                }
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.textContent = `❌ 健康检查失败: ${error.message}`;
            }
        }

        function clearCache() {
            if (confirm('确定要清除浏览器缓存吗？')) {
                localStorage.clear();
                sessionStorage.clear();
                alert('✅ 缓存已清除，建议刷新页面');
            }
        }

        // 回车登录
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
