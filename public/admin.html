<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大乐透AI预测系统 - 后台管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        
        .header h1 {
            font-size: 1.8em;
            color: #f39c12;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 1.3em;
            color: #4facfe;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.95em;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .form-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px 15px;
            color: #fff;
            font-size: 1em;
            width: 100%;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        .form-input::placeholder {
            color: #666;
        }
        
        .number-input {
            width: 70px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .number-input.front {
            border-color: #ff6b6b;
        }
        
        .number-input.front:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }
        
        .number-input.back {
            border-color: #4834d4;
        }
        
        .number-input.back:focus {
            border-color: #4834d4;
            box-shadow: 0 0 10px rgba(72, 52, 212, 0.3);
        }
        
        .separator {
            display: flex;
            align-items: center;
            font-size: 1.5em;
            color: #888;
            padding: 0 5px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-area {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            min-height: 60px;
        }
        
        .status-success {
            background: rgba(56, 239, 125, 0.2);
            border-left: 3px solid #38ef7d;
            color: #38ef7d;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin: 10px 0;
        }
        
        .status-error {
            background: rgba(245, 87, 108, 0.2);
            border-left: 3px solid #f5576c;
            color: #f5576c;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin: 10px 0;
        }
        
        .status-info {
            background: rgba(79, 172, 254, 0.2);
            border-left: 3px solid #4facfe;
            color: #4facfe;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin: 10px 0;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .data-table th {
            background: rgba(0,0,0,0.2);
            color: #4facfe;
            font-weight: bold;
        }
        
        .data-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .number-display {
            display: inline-flex;
            gap: 5px;
        }
        
        .mini-ball {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .mini-ball.front {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }
        
        .mini-ball.back {
            background: linear-gradient(135deg, #4834d4, #686de0);
            color: white;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .back-link {
            display: inline-block;
            color: #4facfe;
            text-decoration: none;
            margin-top: 20px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .password-section {
            background: rgba(245, 87, 108, 0.1);
            border: 1px solid rgba(245, 87, 108, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .password-section h3 {
            color: #f5576c;
            margin-bottom: 15px;
        }
        
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .auth-box {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .auth-box h2 {
            color: #f39c12;
            margin-bottom: 20px;
        }
        
        .auth-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1.1em;
            text-align: center;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 密码验证遮罩 -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2>🔐 后台管理登录</h2>
            <p style="color:#888;margin-bottom:20px;">请输入管理密码</p>
            <input type="password" id="passwordInput" placeholder="请输入密码" onkeypress="if(event.key==='Enter')verifyPassword()">
            <button class="btn btn-primary" onclick="verifyPassword()" style="width:100%;">🔓 登录</button>
            <p id="authError" style="color:#f5576c;margin-top:15px;display:none;">密码错误，请重试</p>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <div class="header">
            <h1>⚙️ 后台管理系统</h1>
            <p>大乐透AI预测系统 - 数据管理中心</p>
        </div>
        
        <!-- 添加新开奖数据 -->
        <div class="card">
            <h2 class="card-title">📝 添加新开奖数据</h2>
            
            <div class="form-group">
                <label class="form-label">期号</label>
                <input type="text" class="form-input" id="periodInput" placeholder="例如: 25138" style="max-width:200px;">
            </div>
            
            <div class="form-group">
                <label class="form-label">开奖日期</label>
                <input type="date" class="form-input" id="dateInput" style="max-width:200px;">
            </div>
            
            <div class="form-group">
                <label class="form-label">开奖号码</label>
                <div class="form-row">
                    <input type="number" class="form-input number-input front" id="front1" min="1" max="35" placeholder="01">
                    <input type="number" class="form-input number-input front" id="front2" min="1" max="35" placeholder="02">
                    <input type="number" class="form-input number-input front" id="front3" min="1" max="35" placeholder="03">
                    <input type="number" class="form-input number-input front" id="front4" min="1" max="35" placeholder="04">
                    <input type="number" class="form-input number-input front" id="front5" min="1" max="35" placeholder="05">
                    <span class="separator">+</span>
                    <input type="number" class="form-input number-input back" id="back1" min="1" max="12" placeholder="01">
                    <input type="number" class="form-input number-input back" id="back2" min="1" max="12" placeholder="02">
                </div>
            </div>
            
            <div class="quick-actions">
                <button class="btn btn-success" onclick="submitNewData()">
                    💾 保存数据
                </button>
                <button class="btn btn-primary" onclick="clearForm()">
                    🗑️ 清空表单
                </button>
                <button class="btn" style="background:#555;color:#fff;" onclick="autoFillNextPeriod()">
                    ⚡ 自动填充下期
                </button>
            </div>
            
            <div class="result-area" id="submitResult" style="display:none;">
                <div class="loading" id="submitLoading">
                    <div class="spinner"></div>
                    <div>正在保存...</div>
                </div>
                <div id="submitContent"></div>
            </div>
        </div>
        
        <!-- 当前数据状态 -->
        <div class="card">
            <h2 class="card-title">📊 当前数据状态</h2>
            
            <button class="btn btn-primary" onclick="loadCurrentData()">
                🔄 刷新数据
            </button>
            
            <div class="result-area" id="dataResult">
                <div class="loading" id="dataLoading">
                    <div class="spinner"></div>
                    <div>加载中...</div>
                </div>
                <div id="dataContent">
                    <div class="status-info">点击「刷新数据」查看当前数据状态</div>
                </div>
            </div>
        </div>
        
        <!-- 最近开奖记录 -->
        <div class="card">
            <h2 class="card-title">📋 最近开奖记录</h2>
            
            <button class="btn btn-primary" onclick="loadRecentResults()">
                📥 加载记录
            </button>
            
            <div class="result-area" id="recentResult">
                <div class="loading" id="recentLoading">
                    <div class="spinner"></div>
                    <div>加载中...</div>
                </div>
                <div id="recentContent">
                    <div class="status-info">点击「加载记录」查看最近开奖数据</div>
                </div>
            </div>
        </div>
        
        <!-- 系统操作 -->
        <div class="card">
            <h2 class="card-title">🛠️ 系统操作</h2>
            
            <div class="quick-actions">
                <button class="btn btn-success" onclick="triggerAutoFetch()">
                    🤖 触发自动抓取
                </button>
                <button class="btn btn-primary" onclick="checkSystemHealth()">
                    ❤️ 系统健康检查
                </button>
                <button class="btn btn-danger" onclick="clearCache()">
                    🧹 清除缓存
                </button>
            </div>
            
            <div class="result-area" id="systemResult" style="display:none;">
                <div id="systemContent"></div>
            </div>
        </div>
        
        <a href="/" class="back-link">← 返回主页</a>
    </div>

    <script>
        // 管理密码（实际使用时应该更复杂）
        const ADMIN_PASSWORD = 'lottery2025';
        
        // 验证密码
        function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                // 设置session标记
                sessionStorage.setItem('adminAuth', 'true');
            } else {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }
        
        // 检查是否已登录
        document.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('adminAuth') === 'true') {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }
            
            // 设置默认日期为今天
            document.getElementById('dateInput').valueAsDate = new Date();
        });
        
        // 自动填充下一期
        async function autoFillNextPeriod() {
            try {
                // 从API获取最新期号
                const response = await fetch('/api/latest-results');
                const data = await response.json();
                
                let nextPeriod = '25140';  // 默认值
                if (data.status === 'success' && data.latest_result) {
                    const currentPeriod = parseInt(data.latest_result.period);
                    nextPeriod = String(currentPeriod + 1);
                }
                
                document.getElementById('periodInput').value = nextPeriod;
                
                // 设置日期为下一个开奖日（周一、周三、周六）
                const today = new Date();
                const dayOfWeek = today.getDay();
                let daysToAdd = 0;
                
                if (dayOfWeek === 0) daysToAdd = 1; // 周日 -> 周一
                else if (dayOfWeek === 1) daysToAdd = 2; // 周一 -> 周三
                else if (dayOfWeek === 2) daysToAdd = 1; // 周二 -> 周三
                else if (dayOfWeek === 3) daysToAdd = 3; // 周三 -> 周六
                else if (dayOfWeek === 4) daysToAdd = 2; // 周四 -> 周六
                else if (dayOfWeek === 5) daysToAdd = 1; // 周五 -> 周六
                else if (dayOfWeek === 6) daysToAdd = 2; // 周六 -> 周一
                
                const nextDate = new Date(today);
                nextDate.setDate(today.getDate() + daysToAdd);
                document.getElementById('dateInput').valueAsDate = nextDate;
                
                alert(`已自动填充：第${nextPeriod}期`);
            } catch (error) {
                // 如果API失败，使用默认值
                document.getElementById('periodInput').value = '25140';
                alert('无法获取最新期号，已使用默认值');
            }
        }
        
        // 清空表单
        function clearForm() {
            document.getElementById('periodInput').value = '';
            document.getElementById('dateInput').valueAsDate = new Date();
            for (let i = 1; i <= 5; i++) {
                document.getElementById('front' + i).value = '';
            }
            document.getElementById('back1').value = '';
            document.getElementById('back2').value = '';
        }
        
        // 提交新数据
        async function submitNewData() {
            const period = document.getElementById('periodInput').value.trim();
            const date = document.getElementById('dateInput').value;
            
            const frontNumbers = [];
            for (let i = 1; i <= 5; i++) {
                const val = parseInt(document.getElementById('front' + i).value);
                if (isNaN(val) || val < 1 || val > 35) {
                    alert('前区号码必须是1-35之间的数字');
                    return;
                }
                frontNumbers.push(val);
            }
            
            const backNumbers = [];
            for (let i = 1; i <= 2; i++) {
                const val = parseInt(document.getElementById('back' + i).value);
                if (isNaN(val) || val < 1 || val > 12) {
                    alert('后区号码必须是1-12之间的数字');
                    return;
                }
                backNumbers.push(val);
            }
            
            if (!period) {
                alert('请输入期号');
                return;
            }
            
            if (!date) {
                alert('请选择日期');
                return;
            }
            
            // 检查号码是否有重复
            const allFront = new Set(frontNumbers);
            if (allFront.size !== 5) {
                alert('前区号码不能重复');
                return;
            }
            
            const allBack = new Set(backNumbers);
            if (allBack.size !== 2) {
                alert('后区号码不能重复');
                return;
            }
            
            const resultDiv = document.getElementById('submitResult');
            const loadingDiv = document.getElementById('submitLoading');
            const contentDiv = document.getElementById('submitContent');
            
            resultDiv.style.display = 'block';
            loadingDiv.classList.add('show');
            contentDiv.innerHTML = '';
            
            try {
                const response = await fetch('/api/update-data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: 'add',
                        period: period,
                        date: date,
                        front_zone: frontNumbers.sort((a,b) => a-b),
                        back_zone: backNumbers.sort((a,b) => a-b)
                    })
                });
                
                const data = await response.json();
                loadingDiv.classList.remove('show');
                
                if (data.status === 'success') {
                    contentDiv.innerHTML = `
                        <div class="status-success">
                            ✅ 数据保存成功！<br>
                            期号: ${period}<br>
                            号码: ${frontNumbers.sort((a,b)=>a-b).join(', ')} + ${backNumbers.sort((a,b)=>a-b).join(', ')}
                        </div>
                    `;
                    clearForm();
                } else {
                    contentDiv.innerHTML = `<div class="status-error">❌ 保存失败: ${data.message}</div>`;
                }
            } catch (error) {
                loadingDiv.classList.remove('show');
                contentDiv.innerHTML = `<div class="status-error">❌ 请求失败: ${error.message}</div>`;
            }
        }
        
        // 加载当前数据状态
        async function loadCurrentData() {
            const loadingDiv = document.getElementById('dataLoading');
            const contentDiv = document.getElementById('dataContent');
            
            loadingDiv.classList.add('show');
            contentDiv.innerHTML = '';
            
            try {
                const response = await fetch('/api/latest-results');
                const data = await response.json();
                
                loadingDiv.classList.remove('show');
                
                if (data.status === 'success') {
                    const latest = data.latest_result;
                    // 兼容两种数据格式
                    const frontNumbers = latest.front_zone || latest.numbers?.slice(0,5) || [];
                    const backNumbers = latest.back_zone || latest.numbers?.slice(5) || [];
                    const dateStr = latest.date || latest.draw_date || '';
                    const totalPeriods = data.total_periods || 'N/A';
                    const dataRange = data.data_range || 'N/A';
                    const dataSource = data.data_source || 'unknown';
                    const isRealtime = data.is_realtime ? '✅ 实时' : '⚠️ 备份';
                    
                    contentDiv.innerHTML = `
                        <div class="status-success">
                            <strong>数据状态正常</strong> (${isRealtime})
                        </div>
                        <table class="data-table">
                            <tr><th>项目</th><th>值</th></tr>
                            <tr><td>最新期号</td><td>${latest.period || 'N/A'}</td></tr>
                            <tr><td>开奖日期</td><td>${dateStr}</td></tr>
                            <tr><td>开奖号码</td><td>
                                <span class="number-display">
                                    ${frontNumbers.map(n => `<span class="mini-ball front">${String(n).padStart(2, '0')}</span>`).join('')}
                                    <span style="margin:0 5px;">+</span>
                                    ${backNumbers.map(n => `<span class="mini-ball back">${String(n).padStart(2, '0')}</span>`).join('')}
                                </span>
                            </td></tr>
                            <tr><td>数据来源</td><td>${dataSource}</td></tr>
                            <tr><td>总期数</td><td>${totalPeriods}期</td></tr>
                            <tr><td>数据范围</td><td>${dataRange}</td></tr>
                        </table>
                    `;
                } else {
                    contentDiv.innerHTML = `<div class="status-error">❌ ${data.message || '获取数据失败'}</div>`;
                }
            } catch (error) {
                loadingDiv.classList.remove('show');
                contentDiv.innerHTML = `<div class="status-error">❌ 请求失败: ${error.message}</div>`;
            }
        }
        
        // 加载最近记录
        async function loadRecentResults() {
            const loadingDiv = document.getElementById('recentLoading');
            const contentDiv = document.getElementById('recentContent');
            
            loadingDiv.classList.add('show');
            contentDiv.innerHTML = '';
            
            try {
                const response = await fetch('/api/latest-results');
                const data = await response.json();
                
                loadingDiv.classList.remove('show');
                
                if (data.status === 'success') {
                    // 优先使用recent_results，否则用latest_result构建
                    let results = data.recent_results || [];
                    if (results.length === 0 && data.latest_result) {
                        results = [data.latest_result];
                    }
                    
                    if (results.length > 0) {
                        let tableHtml = `
                            <table class="data-table">
                                <tr>
                                    <th>期号</th>
                                    <th>日期</th>
                                    <th>开奖号码</th>
                                </tr>
                        `;
                        
                        results.forEach(result => {
                            // 兼容两种数据格式
                            const front = result.front_zone || result.numbers?.slice(0, 5) || [];
                            const back = result.back_zone || result.numbers?.slice(5) || [];
                            const dateStr = result.date || result.draw_date || '';
                            
                            tableHtml += `
                                <tr>
                                    <td>${result.period || 'N/A'}</td>
                                    <td>${dateStr}</td>
                                    <td>
                                        <span class="number-display">
                                            ${front.map(n => `<span class="mini-ball front">${String(n).padStart(2, '0')}</span>`).join('')}
                                            <span style="margin:0 5px;">+</span>
                                            ${back.map(n => `<span class="mini-ball back">${String(n).padStart(2, '0')}</span>`).join('')}
                                        </span>
                                    </td>
                                </tr>
                            `;
                        });
                        
                        tableHtml += '</table>';
                        contentDiv.innerHTML = tableHtml;
                    } else {
                        contentDiv.innerHTML = `<div class="status-info">暂无历史记录</div>`;
                    }
                } else {
                    contentDiv.innerHTML = `<div class="status-error">❌ ${data.message || '加载失败'}</div>`;
                }
            } catch (error) {
                loadingDiv.classList.remove('show');
                contentDiv.innerHTML = `<div class="status-error">❌ 请求失败: ${error.message}</div>`;
            }
        }
        
        // 触发自动抓取
        async function triggerAutoFetch() {
            const resultDiv = document.getElementById('systemResult');
            const contentDiv = document.getElementById('systemContent');
            
            resultDiv.style.display = 'block';
            contentDiv.innerHTML = '<div class="status-info">⏳ 正在触发自动抓取...</div>';
            
            try {
                const response = await fetch('/api/update-data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'auto_fetch' })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    contentDiv.innerHTML = `<div class="status-success">✅ ${data.message}</div>`;
                } else {
                    contentDiv.innerHTML = `<div class="status-error">❌ ${data.message}</div>`;
                }
            } catch (error) {
                contentDiv.innerHTML = `<div class="status-error">❌ 请求失败: ${error.message}</div>`;
            }
        }
        
        // 系统健康检查
        async function checkSystemHealth() {
            const resultDiv = document.getElementById('systemResult');
            const contentDiv = document.getElementById('systemContent');
            
            resultDiv.style.display = 'block';
            contentDiv.innerHTML = '<div class="status-info">⏳ 正在检查系统...</div>';
            
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                if (data.status === 'healthy') {
                    contentDiv.innerHTML = `
                        <div class="status-success">
                            ✅ 系统运行正常<br>
                            服务: ${data.service}<br>
                            版本: ${data.version}<br>
                            时间: ${data.timestamp}
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = `<div class="status-error">❌ 系统异常</div>`;
                }
            } catch (error) {
                contentDiv.innerHTML = `<div class="status-error">❌ 健康检查失败: ${error.message}</div>`;
            }
        }
        
        // 清除缓存
        function clearCache() {
            const resultDiv = document.getElementById('systemResult');
            const contentDiv = document.getElementById('systemContent');
            
            resultDiv.style.display = 'block';
            
            // 清除session storage
            sessionStorage.clear();
            
            // 清除local storage（如果有）
            localStorage.clear();
            
            contentDiv.innerHTML = `
                <div class="status-success">
                    ✅ 缓存已清除<br>
                    建议刷新页面以获取最新数据
                </div>
            `;
        }
    </script>
</body>
</html>
