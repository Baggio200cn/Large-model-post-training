<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禅心慧算 · 大乐透智慧预测平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: '楷体', 'Microsoft YaHei', serif;
            background: linear-gradient(135deg, #8B7355 0%, #D2B48C 50%, #F5DEB3 100%);
            min-height: 100vh;
            color: #2F1B14;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: #2F1B14;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            font-size: 3.2em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: normal;
            letter-spacing: 3px;
        }
        
        .header .subtitle {
            font-size: 1.4em;
            opacity: 0.8;
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .zen-quote {
            font-size: 1.1em;
            opacity: 0.7;
            font-style: italic;
            margin-top: 10px;
            color: #8B4513;
        }
        
        .status-bar {
            background: linear-gradient(90deg, rgba(139, 115, 85, 0.9), rgba(160, 82, 45, 0.9));
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            background: #FFD700;
            border-radius: 50%;
            margin-right: 10px;
            animation: meditation-glow 3s infinite;
        }
        
        @keyframes meditation-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 15px #FFD700; }
        }
        
        .latest-results {
            background: linear-gradient(135deg, rgba(139, 115, 85, 0.15), rgba(210, 180, 140, 0.15));
            color: #2F1B14;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid rgba(139, 115, 85, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .winning-numbers {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 25px 0;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .number-ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .number-ball:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .front-number {
            background: linear-gradient(135deg, #CD853F, #A0522D);
            color: white;
        }
        
        .back-number {
            background: linear-gradient(135deg, #5F9EA0, #4682B4);
            color: white;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 115, 85, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 0.95);
        }
        
        .card h3 {
            color: #8B4513;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: normal;
        }
        
        .zen-button {
            background: linear-gradient(135deg, #CD853F, #A0522D);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 500;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 5px 20px rgba(205, 133, 63, 0.4);
            font-family: inherit;
        }
        
        .zen-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(205, 133, 63, 0.6);
            background: linear-gradient(135deg, #D2691E, #8B4513);
        }
        
        .zen-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results-display {
            background: rgba(245, 222, 179, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            border-left: 4px solid #CD853F;
            min-height: 120px;
            backdrop-filter: blur(5px);
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #8B4513;
            padding: 25px;
        }
        
        .loading.show {
            display: block;
        }
        
        .zen-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .zen-spinner::before {
            content: '☯';
            font-size: 40px;
            position: absolute;
            animation: zen-rotate 2s linear infinite;
            color: #CD853F;
        }
        
        @keyframes zen-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .success {
            background: linear-gradient(135deg, rgba(144, 238, 144, 0.3), rgba(50, 205, 50, 0.3));
            color: #006400;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            border-left: 5px solid #32CD32;
            backdrop-filter: blur(5px);
        }
        
        .error {
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.3), rgba(220, 20, 60, 0.3));
            color: #8B0000;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            border-left: 5px solid #DC143C;
            backdrop-filter: blur(5px);
        }
        
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .header h1 { font-size: 2.5em; }
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>禅心慧算</h1>
            <div class="subtitle">基于深度学习 + 灵修直觉的多模态集成预测平台</div>
            <div class="zen-quote">"安住当下，自在如光"</div>
        </div>

        <div class="status-bar" id="systemStatus">
            <div class="status-indicator"></div>
            <span id="statusText">禅心慧算 - 系统运行正常</span>
        </div>

        <!-- 最新开奖结果展示 - 动态加载 -->
        <div class="latest-results" id="latestResults">
            <h3 style="text-align: center; margin-bottom: 15px;">🏆 最新开奖结果</h3>
            <div id="latestResultsContent">
                <div class="loading show">
                    <div class="zen-spinner"></div>
                    正在获取最新开奖信息...
                </div>
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <h3><span style="font-size: 2em;">📊</span>数据分析与处理</h3>
                <p>深度分析历史开奖数据，识别隐藏模式和趋势规律</p>
                <button class="zen-button" onclick="performDataAnalysis()" id="analysisBtn">执行数据分析</button>
                <div class="results-display" id="analysisResults" style="display: none;">
                    <div class="loading" id="analysisLoading">
                        <div class="zen-spinner"></div>
                        正在分析数据...
                    </div>
                    <div id="analysisContent"></div>
                </div>
            </div>

            <div class="card">
                <h3><span style="font-size: 2em;">🤖</span>多模型训练与预测</h3>
                <p>LSTM、Transformer、XGBoost多模型集成预测</p>
                <button class="zen-button" onclick="generateAIPrediction()" id="predictionBtn">生成AI预测</button>
                <div class="results-display" id="predictionResults" style="display: none;">
                    <div class="loading" id="predictionLoading">
                        <div class="zen-spinner"></div>
                        AI模型正在计算...
                    </div>
                    <div id="predictionContent"></div>
                </div>
            </div>

            <div class="card">
                <h3><span style="font-size: 2em;">🧘</span>灵修图片扰动模块</h3>
                <p>融入宇宙能量感应，调谐预测直觉与随机性</p>
                <button class="zen-button" onclick="getSpiritualFactor()" id="spiritualBtn">获取灵修因子</button>
                <div class="results-display" id="spiritualResults" style="display: none;">
                    <div class="loading" id="spiritualLoading">
                        <div class="zen-spinner"></div>
                        正在感应宇宙能量...
                    </div>
                    <div id="spiritualContent"></div>
                </div>
            </div>

            <div class="card">
                <h3><span style="font-size: 2em;">🎯</span>集成预测模块</h3>
                <p>Stacking方法汇总各模块结果，智能权重调整</p>
                <button class="zen-button" onclick="generateEnsemblePrediction()" id="ensembleBtn">生成最终预测</button>
                <div class="results-display" id="ensembleResults" style="display: none;">
                    <div class="loading" id="ensembleLoading">
                        <div class="zen-spinner"></div>
                        正在集成模型结果...
                    </div>
                    <div id="ensembleContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ZenSystemState = {
            originalPrediction: null,
            spiritualFactor: null,
            finalPrediction: null,
            analysisData: null
        };

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadLatestResults();
        });

        // 动态加载最新开奖结果
        async function loadLatestResults() {
            const loadingElement = document.querySelector('#latestResults .loading');
            const contentElement = document.getElementById('latestResultsContent');
            
            try {
                const response = await fetch('/api/latest-results', {
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.status === 'success' && data.latest_results) {
                    displayLatestResults(data.latest_results);
                } else {
                    throw new Error('数据格式错误');
                }
                
            } catch (error) {
                console.error('加载失败:', error);
                contentElement.innerHTML = '<div class="error">获取开奖数据失败，请稍后刷新页面</div>';
            } finally {
                loadingElement.style.display = 'none';
            }
        }

        function displayLatestResults(results) {
            const frontNumbers = results.winning_numbers.front_zone.map(num => 
                `<div class="number-ball front-number">${num.toString().padStart(2, '0')}</div>`
            ).join('');
            
            const backNumbers = results.winning_numbers.back_zone.map(num => 
                `<div class="number-ball back-number">${num.toString().padStart(2, '0')}</div>`
            ).join('');
            
            let prizeInfo = '';
            if (results.prize_info) {
                prizeInfo = `
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px;">
                        <div><strong>销售总额</strong><br>${results.prize_info.total_sales}</div>
                        <div><strong>奖池金额</strong><br>${results.prize_info.jackpot_pool}</div>
                        <div><strong>中奖注数</strong><br>${results.prize_info.total_winners}</div>
                    </div>
                `;
            }
            
            let nextDraw = '';
            if (results.next_draw) {
                nextDraw = `<div style="margin-top: 15px; color: #8B4513;">
                    <strong>下期预测：</strong>第${results.next_draw.period}期 (${results.next_draw.date})
                </div>`;
            }
            
            const content = `
                <div style="text-align: center;">
                    <h4>第${results.period}期 (${results.draw_date})</h4>
                    <div class="winning-numbers">
                        ${frontNumbers}
                        <span style="margin: 0 20px; font-size: 2em; color: #8B4513;">+</span>
                        ${backNumbers}
                    </div>
                    ${prizeInfo}
                    ${nextDraw}
                </div>
            `;
            
            document.getElementById('latestResultsContent').innerHTML = content;
        }

        // 简化的功能函数
        async function performDataAnalysis() {
            const resultsDiv = document.getElementById('analysisResults');
            const loadingDiv = document.getElementById('analysisLoading');
            const contentDiv = document.getElementById('analysisContent');
            
            resultsDiv.style.display = 'block';
            loadingDiv.style.display = 'block';
            contentDiv.innerHTML = '';
            
            setTimeout(() => {
                loadingDiv.style.display = 'none';
                contentDiv.innerHTML = '<div class="success">✅ 数据分析功能开发中，敬请期待</div>';
            }, 2000);
        }

        async function generateAIPrediction() {
            const resultsDiv = document.getElementById('predictionResults');
            const loadingDiv = document.getElementById('predictionLoading');
            const contentDiv = document.getElementById('predictionContent');
            
            resultsDiv.style.display = 'block';
            loadingDiv.style.display = 'block';
            contentDiv.innerHTML = '';
            
            setTimeout(() => {
                loadingDiv.style.display = 'none';
                contentDiv.innerHTML = '<div class="success">✅ AI预测功能开发中，敬请期待</div>';
            }, 2000);
        }

        async function getSpiritualFactor() {
            const resultsDiv = document.getElementById('spiritualResults');
            const loadingDiv = document.getElementById('spiritualLoading');
            const contentDiv = document.getElementById('spiritualContent');
            
            resultsDiv.style.display = 'block';
            loadingDiv.style.display = 'block';
            contentDiv.innerHTML = '';
            
            setTimeout(() => {
                loadingDiv.style.display = 'none';
                contentDiv.innerHTML = '<div class="success">✅ 灵修模块开发中，敬请期待</div>';
            }, 2000);
        }

        async function generateEnsemblePrediction() {
            const resultsDiv = document.getElementById('ensembleResults');
            const loadingDiv = document.getElementById('ensembleLoading');
            const contentDiv = document.getElementById('ensembleContent');
            
            resultsDiv.style.display = 'block';
            loadingDiv.style.display = 'block';
            contentDiv.innerHTML = '';
            
            setTimeout(() => {
                loadingDiv.style.display = 'none';
                contentDiv.innerHTML = '<div class="success">✅ 集成预测功能开发中，敬请期待</div>';
            }, 2000);
        }
    </script>
</body>
</html>
